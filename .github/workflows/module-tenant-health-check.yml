name: tenant-health-check module

on:
  push:
    paths:
      - "modules/tenant-health-check/**"
      - ".github/workflows/module-tenant-health-check.yml"
  pull_request:
    paths:
      - "modules/tenant-health-check/**"
      - ".github/workflows/module-tenant-health-check.yml"

permissions:
  contents: read
  packages: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore modules/tenant-health-check/tests/TenantHealthCheck.Tests/TenantHealthCheck.Tests.csproj

      - name: Test
        run: dotnet test modules/tenant-health-check/tests/TenantHealthCheck.Tests/TenantHealthCheck.Tests.csproj --configuration Release --no-restore

      - name: Build image
        run: docker build -t tenant-health-check:0.1.0 modules/tenant-health-check

      - name: Publish image to GHCR
        if: startsWith(github.ref, 'refs/tags/tenant-health-check-v')
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker tag tenant-health-check:0.1.0 ghcr.io/${{ github.repository }}/tenant-health-check:0.1.0
          docker push ghcr.io/${{ github.repository }}/tenant-health-check:0.1.0
