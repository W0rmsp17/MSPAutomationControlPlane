name: tenant-health-check module

on:
  workflow_dispatch:
  push:
    paths:
      - "modules/tenant-health-check/**"
      - ".github/workflows/module-tenant-health-check.yml"
    tags:
      - "tenant-health-check-v*"
  pull_request:
    paths:
      - "modules/tenant-health-check/**"
      - ".github/workflows/module-tenant-health-check.yml"

permissions:
  contents: read
  packages: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    env:
      MODULE_PATH: modules/tenant-health-check
      MODULE_VERSION: 0.1.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore ${{ env.MODULE_PATH }}/tests/TenantHealthCheck.Tests/TenantHealthCheck.Tests.csproj

      - name: Test
        run: dotnet test ${{ env.MODULE_PATH }}/tests/TenantHealthCheck.Tests/TenantHealthCheck.Tests.csproj --configuration Release --no-restore

      - name: Prepare image metadata
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY}/tenant-health-check"
          echo "IMAGE_NAME=${image,,}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${MODULE_VERSION}" >> "$GITHUB_ENV"

      - name: Build image
        run: docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" "${MODULE_PATH}"

      - name: Publish image to GHCR
        if: startsWith(github.ref, 'refs/tags/tenant-health-check-v') || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker push "${IMAGE_NAME}:${IMAGE_TAG}"
          docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE_NAME}:${IMAGE_TAG}" > "${MODULE_PATH}/image-digest.txt"

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenant-health-check-manifest
          path: |
            ${{ env.MODULE_PATH }}/module.manifest.json
            ${{ env.MODULE_PATH }}/image-digest.txt
          if-no-files-found: warn
